  <style>
    /* additional robust styles & overrides — ensures clean separation */
    .gallery-header { padding: 4rem 0; }
    @media (min-width: 768px) { .gallery-header { padding: 4rem 0; } }

    .gallery-badge {
      display: inline-block;
      font-size: 15px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #E48A24;
      font-weight: 500;
      margin-bottom: 1rem;
    }

    .gallery-header h1 {
      font-family: var(--font-serif);
      font-size: 2rem;
      font-weight: 500;
      line-height: 1.2;
      color: #2A3A8C;
      margin-bottom: 1rem;
    }
    @media (min-width: 768px) { .gallery-header h1 { font-size: 2.5rem; } }
    @media (min-width: 1024px) { .gallery-header h1 { font-size: 3rem; } }

    .gallery-header p {
      font-size: 15px;
      color: rgba(42, 58, 140, 0.7);
      max-width: 28rem;
    }

    .gallery-filters {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
    }

    .gallery-filter-btn {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.5rem 1rem;
      transition: all 0.3s ease;
      color: rgba(42, 58, 140, 0.7);
      background: transparent;
      border-radius: 40px;
      border: none;
      cursor: pointer;
      font-weight: 500;
    }
    .gallery-filter-btn:hover {
      color: #2A3A8C;
      background: #f1f3f5;
    }
    .gallery-filter-btn.active {
      background: #E48A24;
      color: #FFFFFF;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }
    @media (min-width: 768px) { .gallery-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1024px) { .gallery-grid { grid-template-columns: repeat(3, 1fr); } }

    .gallery-item {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      aspect-ratio: 16 / 9;
      border-radius: 16px;
      background: #f5f5f5;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      border: 1px solid #EEEEEE;
      transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
    }
    .gallery-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 45px rgba(0,0,0,0.14);
      border-color: #E48A24;
    }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      inset: 0;
      z-index: 1;
    }
    /* video thumbnail fix: make sure image covers nicely */
    .gallery-item[data-type="video"] img {
      object-fit: cover;
    }
    iframe.gallery-preview {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      z-index: 2;
      pointer-events: none;  /* prevents iframe stealing clicks, so video click opens new tab */
    }
    .gallery-item-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.65), transparent 60%);
      opacity: 0;
      transition: opacity 0.3s ease;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1rem;
      z-index: 3;
      pointer-events: none;
    }
    .gallery-item:hover .gallery-item-overlay {
      opacity: 1;
    }
    .gallery-item-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: white;
      font-weight: 500;
    }
    .gallery-desc {
      font-size: 12px;
      color: rgba(255,255,255,0.9);
      margin-top: 6px;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.3s ease;
      font-weight: 400;
    }
    .gallery-item:hover .gallery-desc {
      opacity: 1;
      transform: translateY(0);
    }
    .hidden { display: none; }
    .fade-in {
      animation: galleryItemIn 0.35s ease forwards;
    }
    @keyframes galleryItemIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }
    /* ensure photo items do not have any accidental youtube behaviour */
    .gallery-item[data-type="photo"] {
      cursor: pointer;
    }
    /* additional safety: no unintended link styling */
    a, a:hover {
      text-decoration: none;
    }

    /* ── 2560px / 4K tier ── */
    @media (min-width: 2560px) {
      .container { max-width: 2000px; padding-left: 2rem; padding-right: 2rem; }
      .gallery-header { padding: 6rem 0; }
      .gallery-header h1 { font-size: 4.4rem; }
      .gallery-header p { font-size: 22px; max-width: 42rem; }
      .gallery-grid { grid-template-columns: repeat(4, 1fr); gap: 2.5rem; }
      .gallery-filter-btn { font-size: 14px; padding: 0.9rem 1.8rem; }
      .gallery-item-overlay { padding: 1.4rem; }
      .gallery-item-label { font-size: 14px; }
      .gallery-desc { font-size: 15px; }
    }

    /* ── 3840px / 8K tier ── */
    @media (min-width: 3840px) {
      .container { max-width: 2400px; padding-left: 2.5rem; padding-right: 2.5rem; }
      .gallery-header { padding: 8rem 0; }
      .gallery-header h1 { font-size: 5.6rem; }
      .gallery-header p { font-size: 28px; max-width: 56rem; }
      .gallery-grid { grid-template-columns: repeat(5, 1fr); gap: 3rem; }
      .gallery-filter-btn { font-size: 17px; padding: 1.1rem 2.2rem; }
      .gallery-item-overlay { padding: 1.8rem; }
      .gallery-item-label { font-size: 17px; }
      .gallery-desc { font-size: 19px; }
    }
  </style>

<script>
  // helper: extract clean youtube ID
  function getYouTubeId(idOrUrl) {
    if (!idOrUrl) return null;
    if (/^[a-zA-Z0-9_-]{11}$/.test(idOrUrl)) return idOrUrl;
    const urlPattern = /(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/;
    const match = idOrUrl.match(urlPattern);
    return match ? match[1] : idOrUrl;
  }

  // inline video preview on hover (only for video items)
  function playVideoInline(videoElement) {
    if (videoElement.querySelector("iframe.gallery-preview")) return;
    const rawId = videoElement.dataset.youtube;
    if (!rawId) return;
    const videoId = getYouTubeId(rawId);
    if (!videoId) return;

    const iframe = document.createElement("iframe");
    iframe.className = "gallery-preview";
    iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&controls=0&loop=1&playlist=${videoId}&modestbranding=1&playsinline=1`;
    iframe.allow = "autoplay; encrypted-media";
    iframe.setAttribute("frameborder", "0");
    videoElement.appendChild(iframe);
  }

  function stopVideoInline(videoElement) {
    const existingIframe = videoElement.querySelector("iframe.gallery-preview");
    if (existingIframe) existingIframe.remove();
  }

  // show description tooltip for all items (photo + video)
  function showDescription(element) {
    const descBox = element.querySelector(".gallery-desc");
    if (!descBox) return;
    const descriptionText = element.dataset.desc || "";
    descBox.textContent = descriptionText;
    // clear any previous timeout to avoid conflict
    if (element._descTimeout) clearTimeout(element._descTimeout);
    descBox.style.opacity = "1";
    element._descTimeout = setTimeout(() => {
      if (descBox) descBox.style.opacity = "0";
    }, 5000);
  }

  // HANDLE MOUSEENTER / MOUSELEAVE: video preview & description
  function bindHoverEvents() {
    const allItems = document.querySelectorAll(".gallery-item");
    allItems.forEach(item => {
      // remove previous listeners to avoid duplicates (safe)
      item.removeEventListener("mouseenter", item._mouseEnterHandler);
      item.removeEventListener("mouseleave", item._mouseLeaveHandler);

      const mouseEnterHandler = () => {
        showDescription(item);
        if (item.dataset.type === "video") {
          playVideoInline(item);
        }
      };
      const mouseLeaveHandler = () => {
        if (item.dataset.type === "video") {
          stopVideoInline(item);
        }
      };

      item._mouseEnterHandler = mouseEnterHandler;
      item._mouseLeaveHandler = mouseLeaveHandler;

      item.addEventListener("mouseenter", mouseEnterHandler);
      item.addEventListener("mouseleave", mouseLeaveHandler);
    });
  }

  // CLICK HANDLER: open YouTube in new tab ONLY for video items (photo items do nothing)
  function bindClickActions() {
    const videoItems = document.querySelectorAll('.gallery-item[data-type="video"]');
    videoItems.forEach(videoEl => {
      // remove previous click listener to avoid duplication
      if (videoEl._clickHandler) {
        videoEl.removeEventListener("click", videoEl._clickHandler);
      }
      const clickHandler = (e) => {
        // prevents any accidental default (if any leftover)
        e.preventDefault?.();
        e.stopPropagation?.(); // ensures not interfering with parent
        const youtubeCode = videoEl.dataset.youtube;
        if (youtubeCode) {
          const finalId = getYouTubeId(youtubeCode);
          if (finalId) {
            const youtubeUrl = `https://www.youtube.com/watch?v=${finalId}`;
            window.open(youtubeUrl, '_blank', 'noopener,noreferrer');
          }
        }
      };
      videoEl._clickHandler = clickHandler;
      videoEl.addEventListener("click", clickHandler);
    });

    // PHOTO items: absolutely no youtube link — we can optionally add a lightweight image expand? but strict requirement: no video open
    const photoItems = document.querySelectorAll('.gallery-item[data-type="photo"]');
    photoItems.forEach(photoEl => {
      if (photoEl._photoClickGuard) {
        photoEl.removeEventListener("click", photoEl._photoClickGuard);
      }
      const photoGuard = (e) => {
        // explicitly prevent any youtube or external video behaviour
        // optional: provide simple console log? no interference
        e.stopPropagation();
        // do NOTHING related to youtube – solves "photo section opening youtube"
        // if we ever want a future lightbox we could add later, but for fix: complete silence
        return false;
      };
      photoEl._photoClickGuard = photoGuard;
      photoEl.addEventListener("click", photoGuard);
    });
  }

  // FILTER LOGIC (All / Video / Photo) without disturbing event bindings
  function initFilters() {
    const filterBtns = document.querySelectorAll(".gallery-filter-btn");
    const allItems = document.querySelectorAll(".gallery-item");

    function applyFilter(filterValue) {
      allItems.forEach(item => {
        const type = item.dataset.type;
        if (filterValue === "all" || type === filterValue) {
          item.classList.remove("hidden");
          // optional fade-in effect on visible items
          item.style.animation = "none";
          item.offsetHeight; // reflow
          item.style.animation = null;
          item.classList.add("fade-in");
        } else {
          item.classList.add("hidden");
        }
      });
    }

    filterBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        const filter = btn.dataset.filter;
        filterBtns.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        applyFilter(filter);
      });
    });
    // initial: show all
    applyFilter("all");
  }

  // ensure dynamic re-binding when DOM is fully ready (also after potential external loader)
  function initGalleryFull() {
    bindHoverEvents();
    bindClickActions();
    initFilters();
  }

  // if any external components modify dynamic content, we can observe but static is fine.
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initGalleryFull);
  } else {
    initGalleryFull();
  }

  // additional safety: if youtube iframe disappears on filter, re-attach hover events after filter reflow
  // but filter already preserves .gallery-item, we re-run bindings? already called once, no issues.
  // ensure description text for photo items doesn't get overridden: all good
  // also fix accidental conflicts for mouseleave when filter toggled
  window.addEventListener('load', function() {
    // final rebind to be absolutely safe (in case of late-loaded images or external scripts)
    bindHoverEvents();
    bindClickActions();
    // set all descriptions with default clear
    document.querySelectorAll(".gallery-item").forEach(el => {
      const descDiv = el.querySelector(".gallery-desc");
      if (descDiv && el.dataset.desc) {
        // prefill default description (but not showing until hover)
        descDiv.textContent = el.dataset.desc;
      }
    });
  });
</script>
